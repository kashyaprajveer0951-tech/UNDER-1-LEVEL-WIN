let lastPeriod = null;

// Initialize positions
injector.style.left = injectorX + 'px';
injector.style.top = injectorY + 'px';
predictionBox.style.left = boxX + 'px';
predictionBox.style.top = boxY + 'px';

// Start Hack Button
startHackBtn.addEventListener('click', () => {
  injector.classList.add('active');
  startHackBtn.textContent = '✓ ACTIVE';
  startHackBtn.style.background = 'linear-gradient(90deg, #00ff41, #00cc33)';
});

// Drag Functions
let injectorDragged = false;

injector.addEventListener('mousedown', startInjectorDrag);
injector.addEventListener('touchstart', startInjectorDrag, {passive: false});

function startInjectorDrag(e) {
  isInjectorDragging = true;
  injectorDragged = false;
  
  const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
  const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
  
  dragOffsetX = clientX - injectorX;
  dragOffsetY = clientY - injectorY;
}

predictionBox.addEventListener('mousedown', startBoxDrag);
predictionBox.addEventListener('touchstart', startBoxDrag, {passive: false});

function startBoxDrag(e) {
  if (e.target.closest('.box-close') || e.target.closest('.side-btn')) return;
  
  isBoxDragging = true;
  
  const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
  const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
  
  dragOffsetX = clientX - boxX;
  dragOffsetY = clientY - boxY;
}

document.addEventListener('mousemove', handleDrag);
document.addEventListener('touchmove', handleDrag, {passive: false});
document.addEventListener('mouseup', endDrag);
document.addEventListener('touchend', endDrag);

function handleDrag(e) {
  const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
  const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
  
  if (isInjectorDragging) {
    e.preventDefault();
    injectorDragged = true;
    injectorX = clientX - dragOffsetX;
    injectorY = clientY - dragOffsetY;
    
    injectorX = Math.max(0, Math.min(window.innerWidth - 50, injectorX));
    injectorY = Math.max(0, Math.min(window.innerHeight - 50, injectorY));
    
    injector.style.left = injectorX + 'px';
    injector.style.top = injectorY + 'px';
  }
  
  if (isBoxDragging) {
    e.preventDefault();
    boxX = clientX - dragOffsetX;
    boxY = clientY - dragOffsetY;
    
    boxX = Math.max(0, Math.min(window.innerWidth - 200, boxX));
    boxY = Math.max(0, Math.min(window.innerHeight - 180, boxY));
    
    predictionBox.style.left = boxX + 'px';
    predictionBox.style.top = boxY + 'px';
  }
}

function endDrag() {
  isInjectorDragging = false;
  isBoxDragging = false;
}

// Injector Click -> Open Box
injector.addEventListener('click', (e) => {
  if (!injectorDragged) {
    injector.classList.remove('active');
    predictionBox.classList.add('active');
    startPredictionSystem();
  }
});

// Close Box -> Show Injector (EK BAR MEIN CLOSE)
closeBox.addEventListener('click', (e) => {
  e.stopPropagation();
  predictionBox.classList.remove('active');
  injector.classList.add('active');
  stopPredictionSystem();
});

// Hide Button
let isNumberHidden = false;
hideBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  isNumberHidden = !isNumberHidden;
  predictedNumber.style.opacity = isNumberHidden ? '0' : '1';
  hideBtn.textContent = isNumberHidden ? 'SHOW' : 'HIDEN';
});

// Clear Button
document.getElementById('clearBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  resultText.textContent = 'WAIT...';
  resultText.className = 'result-text';
  predictedNumber.textContent = '';
});

// EXACT CORRECT TIMER CODE as provided
function getPeriodAndTime() {
  const now = new Date();
  
  // Get UTC time components
  const seconds = now.getUTCSeconds();
  const remainingSeconds = 60 - seconds;
  const minutes = now.getUTCMinutes();
  const hours = now.getUTCHours();
  const totalMinutes = hours * 60 + minutes;
  
  // Format date as yyyyMMdd
  const year = now.getUTCFullYear();
  const month = String(now.getUTCMonth() + 1).padStart(2, '0');
  const day = String(now.getUTCDate()).padStart(2, '0');
  const dateStr = year + month + day;
  
  // Calculate period number: yyyyMMdd + 1000 + (10001 + totalMinutes)
  const periodNum = 10001 + totalMinutes;
  const periodNumber = dateStr + '1000' + periodNum;
  
  // Format timer: "  x x  :  x x" (exact format)
  const minStr = '00';
  const secStr = String(remainingSeconds).padStart(2, '0');
  const formattedTime = `   ${minStr[0]} ${minStr[1]}  :  ${secStr[0]} ${secStr[1]}`;
  
  return {
    periodNumber: periodNumber.toString(),
    timer: formattedTime,
    remainingSeconds: remainingSeconds,
    isNewPeriod: remainingSeconds >= 59 || remainingSeconds <= 1
  };
}

// Generate Prediction Algorithm
function generatePrediction() {
  // Random BIG or SMALL
  const isBig = Math.random() > 0.5;
  const prediction = isBig ? 'BIG' : 'SMALL';
  
  // Generate 1 number based on prediction
  let number;
  if (isBig) {
    number = Math.floor(Math.random() * 5) + 5; // 5,6,7,8,9
  } else {
    number = Math.floor(Math.random() * 5); // 0,1,2,3,4
  }
  
  return { prediction, number };
}

// Update Display - SHOW PERIOD & TIMER
function updateDisplay(periodData) {
  periodInfo.textContent = periodData.periodNumber;
  timer.textContent = periodData.timer;
  
  // Check if new period started - AUTO GENERATE NEW PREDICTION
  if (periodData.periodNumber !== lastPeriod && periodData.isNewPeriod) {
    lastPeriod = periodData.periodNumber;
    currentPeriod = periodData.periodNumber;
    
    // Generate new prediction for new period
    const newPred = generatePrediction();
    currentPrediction = newPred.prediction;
    currentNumber = newPred.number;
    
    // Animate change with LIGHT EFFECT
    resultText.style.opacity = '0';
    setTimeout(() => {
      resultText.textContent = currentPrediction;
      resultText.className = 'result-text ' + (currentPrediction === 'BIG' ? 'big' : 'small');
      predictedNumber.textContent = 'Number: ' + currentNumber;
      resultText.style.opacity = '1';
    }, 300);
  }
}

// Start Prediction System
function startPredictionSystem() {
  loadingOverlay.classList.add('active');
  
  const initialData = getPeriodAndTime();
  periodInfo.textContent = initialData.periodNumber;
  timer.textContent = initialData.timer;
  
  setTimeout(() => {
    loadingOverlay.classList.remove('active');
    
    const periodData = getPeriodAndTime();
    lastPeriod = periodData.periodNumber;
    currentPeriod = periodData.periodNumber;
    
    const newPred = generatePrediction();
    currentPrediction = newPred.prediction;
    currentNumber = newPred.number;
    
    resultText.textContent = currentPrediction;
    resultText.className = 'result-text ' + (currentPrediction === 'BIG' ? 'big' : 'small');
    predictedNumber.textContent = 'Number: ' + currentNumber;
    
    periodInfo.textContent = periodData.periodNumber;
    timer.textContent = periodData.timer;
  }, 2000);
  
  timerInterval = setInterval(() => {
    const periodData = getPeriodAndTime();
    updateDisplay(periodData);
  }, 1000);
}

// Stop Prediction System
function stopPredictionSystem() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

// Prevent context menu
document.addEventListener('contextmenu', e => e.preventDefault());

// Handle resize
window.addEventListener('resize', () => {
  injectorX = Math.min(injectorX, window.innerWidth - 50);
  injectorY = Math.min(injectorY, window.innerHeight - 50);
  boxX = Math.min(boxX, window.innerWidth - 200);
  boxY = Math.min(boxY, window.innerHeight - 180);
  
  injector.style.left = injectorX + 'px';
  injector.style.top = injectorY + 'px';
  predictionBox.style.left = boxX + 'px';
  predictionBox.style.top = boxY + 'px';
});
</script>

</body>
